{% extends "base.html" %}
{% block title %}Catálogo | Livraria{% endblock %}

{% block content %}
<section class="section-header">
  <div>
    <p class="eyebrow">Catálogo</p>
    <h1>Todos os livros</h1>
  </div>
  <form class="search inline" action="{{ url_for('catalogo') }}" method="get">
    <input name="q" placeholder="Buscar" value="{{ term }}">
    <button type="submit">Buscar</button>
  </form>
</section>

<section class="grid">
  {% for book in books %}
    {% include "_book_card.html" %}
  {% else %}
    <p>Nenhum livro encontrado.</p>
  {% endfor %}
</section>
{% endblock %}
